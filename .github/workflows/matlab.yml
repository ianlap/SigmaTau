name: MATLAB Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Run MATLAB Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: mathworks/setup-matlab@v2

      - name: Run all tests
        uses: mathworks/run-command@v2
        with:
          command: addpath(genpath('matlab')); run('matlab/tests/run_all.m')

  lint:
    name: MATLAB Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: mathworks/setup-matlab@v2

      - name: Check syntax with checkcode
        uses: mathworks/run-command@v2
        with:
          command: |
            files = dir(fullfile('matlab','**','*.m'));
            errs = {};
            for k = 1:numel(files)
                f = fullfile(files(k).folder, files(k).name);
                if contains(f, 'legacy'), continue; end % skip legacy code
                msgs = checkcode(f, '-id');
                if ~isempty(msgs)
                    errs{end+1} = sprintf('%s: %d messages', f, numel(msgs));
                    disp(['Messages for ', f, ':']);
                    disp(msgs);
                end
            end
            if ~isempty(errs)
                error('Syntax/code quality issues found.');
            end
            disp('All non-legacy MATLAB files passed syntax check.');
