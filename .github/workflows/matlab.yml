name: MATLAB Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Run MATLAB Tests
    runs-on: ubuntu-latest
    env:
      MLM_LICENSE_TOKEN: ${{ secrets.MATLAB_BATCH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: Statistics_and_Machine_Learning_Toolbox

      - name: Run tests
        uses: matlab-actions/run-command@v3
        with:
          command: addpath(genpath('matlab')); run('matlab/tests/run_all.m')

  lint:
    name: MATLAB Syntax Check
    runs-on: ubuntu-latest
    env:
      MLM_LICENSE_TOKEN: ${{ secrets.MATLAB_BATCH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: Statistics_and_Machine_Learning_Toolbox

      - name: Check syntax with codeIssues
        uses: matlab-actions/run-command@v3
        with:
          command: |
            issues = codeIssues('matlab');
            errs = issues.Issues(issues.Issues.Severity == "error", :);
            if ~isempty(errs)
                keep = ~contains(string(errs.FullFilename), 'legacy');
                errs = errs(keep, :);
            end
            if ~isempty(errs)
                disp(errs);
                error('Syntax errors found in non-legacy MATLAB files.');
            end
            disp('All non-legacy MATLAB files passed syntax check.');
