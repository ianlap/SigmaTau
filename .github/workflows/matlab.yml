name: MATLAB Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Run MATLAB Tests
    runs-on: ubuntu-latest
    env:
      MLM_LICENSE_TOKEN: ${{ secrets.MATLAB_BATCH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: Statistics_and_Machine_Learning_Toolbox

      - name: Run tests
        uses: matlab-actions/run-tests@v3
        with:
          # Add matlab/ to the search path before running tests
          source-folder: matlab

  lint:
    name: MATLAB Syntax Check
    runs-on: ubuntu-latest
    env:
      MLM_LICENSE_TOKEN: ${{ secrets.MATLAB_BATCH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: Statistics_and_Machine_Learning_Toolbox

      - name: Check syntax with checkcode
        uses: matlab-actions/run-command@v3
        with:
          command: |
            files = dir(fullfile('matlab','**','*.m'));
            errs = {};
            for k = 1:numel(files)
                f = fullfile(files(k).folder, files(k).name);
                if contains(f, 'legacy'), continue; end % skip legacy code
                msgs = checkcode(f, '-id');
                if ~isempty(msgs)
                    errs{end+1} = sprintf('%s: %d messages', f, numel(msgs));
                    disp(['Messages for ', f, ':']);
                    disp(msgs);
                end
            end
            if ~isempty(errs)
                error('Syntax/code quality issues found.');
            end
            disp('All non-legacy MATLAB files passed syntax check.');
