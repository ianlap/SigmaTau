name: Python Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python Cross-Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas allantools

      - name: Run allantools vs Stable32 cross-validation
        run: python matlab/tests/test_allantools_stable32.py

      - name: Run allantools vs SigmaTau (WFM) cross-validation
        run: python matlab/tests/test_allantools_adev.py
